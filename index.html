<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haag Family Missionary Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <button id="menuToggle" class="collapse-btn menu-toggle" type="button">☰ Menu</button>
  <button id="statsToggle" class="collapse-btn stats-toggle" type="button">📊 Stats</button>

  <aside id="menuPanel" class="map-panel left-panel">
    <div class="panel-header">
      <div><h1>Haag Family</h1><div class="subtitle">Missionary Map</div></div>
      <button id="menuClose" class="panel-close" type="button">×</button>
    </div>

    <div class="panel-section"><h3>Search</h3><input type="text" id="searchInput" placeholder="Search name, mission, country..." /></div>

    <div class="panel-section"><h3>Haag Siblings</h3>
      <select id="familyFilter">
        <option value="all">All</option><option>Darrell</option><option>Jeanette</option><option>Jolene</option><option>Joyce</option><option>Spencer</option><option>Valerie</option><option>Veronika</option><option>Bonnie</option><option>Brenda</option><option>Eileen</option><option>Heidi</option><option>Bradley</option>
      </select>
    </div>

    <div class="panel-section"><h3>Years Served</h3>
      <details class="year-dropdown"><summary>Select Years</summary><div id="yearCheckboxes" class="year-checkboxes"></div></details>
      <button id="clearYears" type="button" class="clear-years-btn">Clear Years</button>
    </div>

    <div class="panel-section"><h3>Legend</h3>
      <label class="legend-check"><input type="checkbox" id="showElders" checked /><span class="legend-dot elder-dot"></span>Elders</label>
      <label class="legend-check"><input type="checkbox" id="showSisters" checked /><span class="legend-dot sister-dot"></span>Sisters</label>
      <label class="legend-check"><input type="checkbox" id="showCurrent" checked /><span class="legend-symbol">✓</span>Currently Serving</label>
      <label class="legend-check"><input type="checkbox" id="showInLaws" checked /><span class="legend-symbol">♥</span>Married In / In-law</label>
      <div class="legend-row"><span class="legend-dot mixed-dot"></span>Elders & Sisters</div>
    </div>
  </aside>

  <aside id="statsPanel" class="map-panel right-panel">
    <div class="panel-header small-header"><h3>Statistics</h3><button id="statsClose" class="panel-close" type="button">×</button></div>
    <div class="stat"><span>Total Missionaries</span><strong id="totalMissionaries">--</strong></div>
    <div class="stat"><span>Total Elders</span><strong id="totalElders">--</strong></div>
    <div class="stat"><span>Total Sisters</span><strong id="totalSisters">--</strong></div>
    <div class="stat"><span>Currently Serving</span><strong id="currentMissionaries">--</strong></div>
    <div class="stat"><span>Countries</span><strong id="countriesServed">--</strong></div>
    <div class="stat"><span>Continents</span><strong id="totalContinents">--</strong></div>
    <div class="stat"><span>Languages</span><strong id="totalLanguages">--</strong></div>
    <div class="stat-highlight"><span>Duplicate Missions</span><strong id="duplicateMissions">--</strong></div>
    <div class="stat-highlight"><span>Most Common Language</span><strong id="topLanguage">--</strong></div>
    <div class="stat-highlight"><span>Most Served Country</span><strong id="topCountry">--</strong></div>
  </aside>

  <div id="detailPreview" class="detail-preview hidden"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
