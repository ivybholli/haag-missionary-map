<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Haag Missionary Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>

  <aside class="map-panel left-panel">
    <h1>Haag Missionary Map</h1>

    <div class="panel-section">
      <h3>Search</h3>
      <input
        type="text"
        id="searchInput"
        placeholder="Search missionary, mission, country..."
      />
    </div>

    <div class="panel-section">
      <h3>Haag Siblings</h3>
      <select id="familyFilter">
        <option value="all">Whole Haag Family</option>
        <option value="Darrell">Darrell</option>
        <option value="Jeanette">Jeanette</option>
        <option value="Jolene">Jolene</option>
        <option value="Joyce">Joyce</option>
        <option value="Spencer">Spencer</option>
        <option value="Valerie">Valerie</option>
        <option value="Veronika">Veronika</option>
        <option value="Bonnie">Bonnie</option>
        <option value="Brenda">Brenda</option>
        <option value="Eileen">Eileen</option>
        <option value="Heidi">Heidi</option>
        <option value="Bradley">Bradley</option>
      </select>
    </div>

    <div class="panel-section">
  <h3>Years Served</h3>

  <details class="year-dropdown">
    <summary>Select Years</summary>
    <div id="yearCheckboxes" class="year-checkboxes"></div>
  </details>

  <button id="clearYears" type="button" class="clear-years-btn">
    Clear Years
  </button>
</div>
    
    <div class="panel-section">
      <h3>Legend</h3>

      <label class="legend-check">
        <input type="checkbox" id="showElders" checked />
        <span class="legend-dot elder-dot"></span>
        Elders
      </label>

      <label class="legend-check">
        <input type="checkbox" id="showSisters" checked />
        <span class="legend-dot sister-dot"></span>
        Sisters
      </label>

      <label class="legend-check">
        <input type="checkbox" id="showCurrent" checked />
        <span class="legend-symbol">✓</span>
        Currently Serving
      </label>

      <label class="legend-check">
        <input type="checkbox" id="showInLaws" checked />
        <span class="legend-symbol">♥</span>
        Married In / In-law
      </label>

      <div class="legend-row">
        <span class="legend-dot mixed-dot"></span>
        Elders & Sisters
      </div>
    </div>
  </aside>

  <aside class="map-panel right-panel">
    <h3>Statistics</h3>

    <div class="stat"><span>Total Missionaries</span><strong id="totalMissionaries">--</strong></div>
    <div class="stat"><span>Total Elders</span><strong id="totalElders">--</strong></div>
    <div class="stat"><span>Total Sisters</span><strong id="totalSisters">--</strong></div>
    <div class="stat"><span>Currently Serving</span><strong id="currentMissionaries">--</strong></div>
    <div class="stat"><span>Countries</span><strong id="countriesServed">--</strong></div>
    <div class="stat"><span>Languages</span><strong id="totalLanguages">--</strong></div>
    <div class="stat"><span>Continents</span><strong id="totalContinents">--</strong></div>

    <div class="stat-highlight">
      <span>Most Common Language</span>
      <strong id="topLanguage">--</strong>
    </div>

    <div class="stat-highlight">
      <span>Most Served Country</span>
      <strong id="topCountry">--</strong>
    </div>

    <div class="stat-highlight">
      <span>Most Common Mission</span>
      <strong id="topMission">--</strong>
    </div>
  </aside>

    <input type="range" id="timelineSlider" min="1900" max="2035" value="2035" />

    <div class="timeline-actions">
      <button id="showAllYears" type="button">All Years</button>
      <button id="showToday" type="button">Today</button>
    </div>
  </div>

  <div id="detailPreview" class="detail-preview hidden"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="data.js"></script>
  <script src="helpers.js"></script>
  <script src="popups.js"></script>
  <script src="markers.js"></script>
  <script src="stats.js"></script>
  <script src="filters.js"></script>
  <script src="app.js"></script>
</body>
</html>
