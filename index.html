<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Haag Missionary Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>

  <aside class="map-panel left-panel">
    <h1>Haag Missionary Map</h1>

    <div class="panel-section">
      <h3>Haag Siblings</h3>

      <select id="familyFilter">
        <option value="all">Whole Haag Family</option>
        <option value="Darrell">Darrell</option>
        <option value="Jeanette">Jeanette</option>
        <option value="Jolene">Jolene</option>
        <option value="Joyce">Joyce</option>
        <option value="Spencer">Spencer</option>
        <option value="Valerie">Valerie</option>
        <option value="Veronika">Veronika</option>
        <option value="Bonnie">Bonnie</option>
        <option value="Brenda">Brenda</option>
        <option value="Eileen">Eileen</option>
        <option value="Heidi">Heidi</option>
        <option value="Bradley">Bradley</option>
      </select>
    </div>

    <div class="panel-section">
      <h3>Legend</h3>

      <label class="legend-check">
        <input type="checkbox" id="showElders" checked />
        <span class="legend-dot elder-dot"></span>
        Elders
      </label>

      <label class="legend-check">
        <input type="checkbox" id="showSisters" checked />
        <span class="legend-dot sister-dot"></span>
        Sisters
      </label>

      <div class="legend-row">
        <span class="legend-symbol">★</span>
        Currently Serving
      </div>

      <div class="legend-row">
        <span class="legend-symbol">♥</span>
        Married In / In-law
      </div>

      <div class="legend-row">
        <span class="legend-dot mixed-dot"></span>
        Elders & Sisters
      </div>
    </div>
  </aside>

  <aside class="map-panel right-panel">
    <h3>Statistics</h3>

    <div class="stat">
      <span>Total Missionaries</span>
      <strong id="totalMissionaries">--</strong>
    </div>

    <div class="stat">
      <span>Total Elders</span>
      <strong id="totalElders">--</strong>
    </div>

    <div class="stat">
      <span>Total Sisters</span>
      <strong id="totalSisters">--</strong>
    </div>

    <div class="stat">
      <span>Countries</span>
      <strong id="countriesServed">--</strong>
    </div>

    <div class="stat">
      <span>Languages</span>
      <strong id="totalLanguages">--</strong>
    </div>

    <div class="stat">
      <span>Continents</span>
      <strong id="totalContinents">--</strong>
    </div>
  </aside>

  <div id="infoCard" class="info-card hidden">
    <button id="closeCard" class="close-card" aria-label="Close">×</button>
    <div id="infoCardContent"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
